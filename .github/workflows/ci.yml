name: CI

# Runs on pull requests (and the merge queue) only. A push to main does not
# re-run these checks: every change reaches main through a checked PR, the memo
# deploy re-gates itself in deploy-memo.yml, and me is built locally before its
# manual deploy.
on:
  pull_request:
    branches: ["*"]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  checks:
    name: Lint, Test, Type check & Build
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-ci') }}
    # Verify the code against fixtures and skip the heavy content submodules.
    # me reads CONTENT_DIR, memo reads USE_FIXTURE_DATA; both are set so the
    # workspace-wide `pnpm -r` scripts pick up fixtures for each app. Real
    # content errors are caught at deploy time. See src/__fixtures__.
    env:
      CONTENT_DIR: src/__fixtures__/content
      USE_FIXTURE_DATA: "true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Type check
        run: pnpm check

      - name: Build
        run: pnpm build
