name: Sync memo submodule

# Keeps apps/memo/memo-content pointing at the latest content. Opens a PR (which
# runs CI) and auto-merges it; the merge then triggers deploy-memo.yml.
on:
  schedule:
    # Run daily at 02:00 JST (17:00 UTC previous day)
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          token: ${{ secrets.SUBMODULE_TOKEN }}

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "24"

      - name: Update submodule
        id: update
        run: |
          BEFORE_HASH=$(git -C apps/memo/memo-content rev-parse HEAD)

          git -C apps/memo/memo-content fetch origin main
          git -C apps/memo/memo-content reset --hard origin/main

          AFTER_HASH=$(git -C apps/memo/memo-content rev-parse HEAD)

          if [ "$BEFORE_HASH" = "$AFTER_HASH" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes in submodule"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"

            TIMESTAMP=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')
            echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"

            echo "Submodule updated"
          fi

      - name: Create PR and auto-merge
        if: steps.update.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.SUBMODULE_TOKEN }}
          TIMESTAMP: ${{ steps.update.outputs.timestamp }}
        run: |
          git config user.name "kkhys"
          git config user.email "kkhys@pm.me"

          TITLE="[main] chore: update memo submodule"
          COMMIT_MSG="chore(memo): update submodule at ${TIMESTAMP}"

          pnpm install --no-frozen-lockfile

          BRANCH="update-memo-submodule-$(TZ=Asia/Tokyo date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add apps/memo/memo-content pnpm-lock.yaml
          git commit -m "$COMMIT_MSG"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "Automated memo submodule update at ${TIMESTAMP}" \
            --label "type: submodule" \
            --assignee kkhys

          gh pr merge --auto --squash --delete-branch
