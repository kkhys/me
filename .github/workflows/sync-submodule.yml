name: Sync Submodule

on:
  schedule:
    # Run daily at 02:00 JST (17:00 UTC previous day)
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
          token: ${{ secrets.SUBMODULE_TOKEN }}

      - name: Update submodule
        id: update
        run: |
          BEFORE_HASH=$(git -C memo-content rev-parse HEAD)

          cd memo-content
          git fetch origin main
          git reset --hard origin/main
          cd ..

          AFTER_HASH=$(git -C memo-content rev-parse HEAD)

          if [ "$BEFORE_HASH" = "$AFTER_HASH" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes in submodule"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT

            TIMESTAMP=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')
            echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

            echo "Submodule updated"
          fi

      - name: Create PR and auto-merge
        if: steps.update.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "kkhys"
          git config user.email "kkhys@pm.me"

          TIMESTAMP="${{ steps.update.outputs.timestamp }}"

          TITLE="[main] chore: update submodule"
          COMMIT_MSG="chore(memo): update submodule at $TIMESTAMP"

          BRANCH="update-submodule-$(TZ=Asia/Tokyo date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add memo-content
          git commit -m "$COMMIT_MSG"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "Automated submodule update at $TIMESTAMP" \
            --label "type: submodule" \
            --assignee kkhys

          gh pr merge --auto --squash --delete-branch
